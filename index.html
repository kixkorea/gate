<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인증 센터</title>
    <script src="https://js.tosspayments.com/v1/payment"></script>
</head>
<body style="background:#1a1a1a; color:white; text-align:center; padding-top:50px; font-family:sans-serif;">
    
    <img src="https://raw.githubusercontent.com/kixkorea/gate/main/splash_screen_logo.png" style="max-width:300px; margin-bottom:20px;">
    
    <h1>프로그램 인증 센터</h1>
    <p>이메일을 입력하고 아래 버튼을 누르면 결제가 시작됩니다.</p>

    <input type="email" id="uEmail" placeholder="abc@naver.com" style="padding:10px; width:250px; border-radius:5px;">
    <br><br>

    <button onclick="pay()" style="padding:15px 30px; background:#3182f6; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">
        10,000원 결제하기
    </button>

    <script>
        var toss = TossPayments('test_ck_D53Qo7Q68VJnr1k6l4V3uW6YqEga');

        function pay() {
            var email = document.getElementById('uEmail').value;
            if(!email) return alert("이메일을 입력해주세요!");

            toss.requestPayment('카드', {
                amount: 10000,
                orderId: 'ORD-' + Date.now(),
                orderName: '프로그램 이용권',
                customerEmail: email,
                successUrl: window.location.href, 
                failUrl: window.location.href
            }).catch(function (error) {
                alert(error.message);
            });
        }
    </script>
</body>
</html>
